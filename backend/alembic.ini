[alembic]

# Path to migration scripts
script_location = alembic

# Path to be prepended to sys.path
prepend_sys_path = .

# Version path separator
version_path_separator = os

# Search source files recursively
recursive_version_locations = true


# Template for migration file names
# Format: YYYY_MM_DD_HHMM_revision_slug.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Max length of the slug field
truncate_slug_length = 60


# Use environment variable for database URL
sqlalchemy.url = ${DATABASE_URL_SYNC}


# Multiple version locations for modular migrations
version_locations = alembic/versions
# version_locations = alembic/versions alembic/versions/customer alembic/versions/loan alembic/versions/ml

# Run environment during 'revision' command
revision_environment = true

# Allow .pyc files without source .py files
sourceless = false

# Timezone for rendering dates
# timezone = Africa/Nairobi

# Output encoding for revision files
output_encoding = utf-8


# Post-Write Hooks
[post_write_hooks]
# Format migrations with Black
hooks = black

# Black configuration
black.type = console_scripts
black.entrypoint = black
black.options = -l 100 REVISION_SCRIPT_FILENAME

# Optional: Add isort for import sorting
# hooks = black,isort
# isort.type = console_scripts
# isort.entrypoint = isort
# isort.options = REVISION_SCRIPT_FILENAME

# Logging Configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S