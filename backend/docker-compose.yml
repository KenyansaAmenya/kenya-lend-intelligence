  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: kenya-lend-worker
  #   command: celery -A app.tasks worker --loglevel=info
  #   environment:
  #     - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/kenya_lend_dev
  #   depends_on:
  #     - db
  #     - redis
  #   networks:
  #     - kenya-lend-network

 
  # MLflow (Will use this in the future)
